{% extends "base.html" %}
{% load static %}

{% block title %}Upload Audio{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'dashboard/css/upload.css' %}">
{% endblock %}

{% block content %}
<div class="container-sm mt-5">
  <div class="card shadow-sm border-0 upload-card">
    <div class="card-header bg-white text-dark text-center py-4 border-bottom">
      <h2 class="mb-0 fs-4 fw-bold"><i class="fas fa-upload me-2"></i>Upload Meeting Recording</h2>
    </div>
    <div class="card-body p-5">
      <form id="upload-form" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-4">
          <label for="audio-file" class="form-label fw-semibold">Select Audio File</label>
          <input
            type="file"
            name="audio_file"
            id="audio-file"
            accept=".m4a,.mp3,.wav"
            class="form-control form-control-lg"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold">
          <i class="fas fa-play me-2"></i>Start Transcription
        </button>
      </form>
      <div id="upload-progress" class="progress mt-4 d-none">
        <div id="upload-progress-bar" class="progress-bar progress-bar-striped progress-bar-animated"
             role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
      </div>
      <p id="upload-status" class="mt-3 text-center text-muted fst-italic"></p>
    </div>
    <div class="card-footer text-center small text-muted border-top">
      Accepted formats: .m4a, .mp3, .wav
    </div>
  </div>
</div>

<script src="{% static 'dashboard/js/upload.js' %}"></script>
{% endblock %}
